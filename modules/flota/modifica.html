<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Modifică vehicul</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#0078d7">
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("../../sw.js").catch((error) => {
            console.error("Service Worker registration failed:", error);
          });
        });
      }
    </script>
</head>

<body onload="incarca()">

<h2>Modifică vehicul</h2>

<form id="form">
    <label>Număr înmatriculare:</label>
    <input id="nr" type="text"><br>

    <label>VIN:</label>
    <input id="vin" type="text"><br>

    <label>Marca:</label>
    <input id="marca" type="text"><br>

    <label>ITP:</label>
    <input id="itp" type="date"><br>

    <label>RCA:</label>
    <input id="rca" type="date"><br>

    <label>Rovinietă:</label>
    <input id="rov" type="date"><br>

    <label>Link documente:</label>
    <input id="link" type="text"><br>

    <label>Observații:</label>
    <input id="obs" type="text"><br>

    <button type="button" onclick="salveaza()">Salvează</button>
    <button type="button" onclick="sterge()">Șterge</button>
</form>

<script>
const url = "https://script.google.com/macros/s/AKfycby44VeJwAhO5SDklVUyGB5otT0QBpue_vtfWyFScs5uelDlvIwkbJm6t6nZB1CjDOlW5A/exec";

const params = new URLSearchParams(window.location.search);
const row = Number(params.get("row"));   // rândul real din Google Sheet

// =======================
// 1. ÎNCARCĂ DATELE
// =======================
async function incarca() {
    const r = await fetch(url);
    const masini = await r.json();

    // găsim mașina după rowIndex
    const m = masini.find(x => Number(x.rowIndex) === row);

    if (!m) {
        alert("Eroare: nu am găsit vehiculul!");
        return;
    }

    document.getElementById("nr").value = m.nr;
    document.getElementById("vin").value = m.vin;
    document.getElementById("marca").value = m.marca;
    document.getElementById("itp").value = m.itp;
    document.getElementById("rca").value = m.rca;
    document.getElementById("rov").value = m.rovinieta;
    document.getElementById("link").value = m.link;
    document.getElementById("obs").value = m.obs;
}

// =======================
// 2. SALVEAZĂ MODIFICAREA
// =======================
async function salveaza() {
    const payload = {
        row: row,   // AICI ESTE CHEIA!
        nr: document.getElementById("nr").value,
        vin: document.getElementById("vin").value,
        marca: document.getElementById("marca").value,
        itp: document.getElementById("itp").value,
        rca: document.getElementById("rca").value,
        rovinieta: document.getElementById("rov").value,
        link: document.getElementById("link").value,
        obs: document.getElementById("obs").value
    };

    await fetch(url, {
        method: "POST",
        body: JSON.stringify(payload)
    });

    alert("Vehicul modificat!");
    window.location.href = "lista_auto.html";
}

// =======================
// 3. ȘTERGE VEHICUL
// =======================
async function sterge() {
    if (!confirm("Sigur vrei să ștergi acest vehicul?")) return;

    await fetch(url, {
        method: "POST",
        body: JSON.stringify({
            delete: true,
            row: row
        })
    });

    alert("Vehicul șters!");
    window.location.href = "lista_auto.html";
}
</script>

</body>
</html>
