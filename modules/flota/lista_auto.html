<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Lista Mașini - Flota Auto</title>
  <link rel="stylesheet" href="../../style.css">

  <style>
    /* ===========================
       VARIABILE DARK / LIGHT
    ============================ */
    :root {
        --bg: #f5f5f5;
        --bg-header: #ffffff;
        --text-header: #1e293b;
        --btn-bg: #e2e8f0;
        --btn-text: #1e293b;
        --card-bg: #ffffff;
        --card-border: #ddd;
    }

    .dark {
        --bg: #0f172a;
        --bg-header: #1e293b;
        --text-header: #f8fafc;
        --btn-bg: #334155;
        --btn-text: #f8fafc;
        --card-bg: #1e293b;
        --card-border: #475569;
    }

    body {
        background: var(--bg);
        color: var(--text-header);
        margin: 0;
        font-family: Segoe UI, sans-serif;
    }

    /* ===========================
       HEADER
    ============================ */
    .hub-header {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: var(--bg-header);
        color: var(--text-header);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 18px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .hub-left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .hub-logo {
        height: 32px;
    }

    .hub-title {
        font-size: 20px;
        font-weight: 600;
    }

    .hub-right {
        display: flex;
        gap: 10px;
    }

    .hub-btn {
        background: var(--btn-bg);
        color: var(--btn-text);
        border: none;
        padding: 8px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
    }

    /* ===========================
       CARDURI MASINI
    ============================ */
    .lista-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 15px;
        padding: 15px;
    }

    .card {
        background: var(--card-bg);
        border: 2px solid var(--card-border);
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card h2 {
        margin: 0 0 5px;
        font-size: 20px;
    }

    .card p {
        margin: 4px 0;
        font-size: 14px;
    }

    .verde { color: #2ecc71; }
    .galben { color: #f1c40f; }
    .rosu { color: #e74c3c; }

    .butoane {
        margin-top: 12px;
        display: flex;
        gap: 10px;
    }

    .butoane button,
    .butoane a {
        flex: 1;
        padding: 10px;
        font-size: 15px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        color: white;
    }

    .butoane button {
        background: #2B6CB0;
    }

    .butoane a {
        background: #555;
    }
	
	/* ===========================
   LISTA CARDURI
=========================== */
.lista-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 18px;
    padding: 20px;
}

/* ===========================
   CARD MASINA
=========================== */
.card {
    background: var(--card-bg);
    border: 2px solid var(--card-border);
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.12);
    transition: 0.2s ease;
}

.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.18);
}

/* ===========================
   TITLU + VIN
=========================== */
.card .nr {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
}

.card .vin {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 12px;
}

/* ===========================
   LINIUTE ITP / RCA / ROV
=========================== */
.linie {
    font-size: 15px;
    margin: 4px 0;
    display: flex;
    justify-content: space-between;
}

.linie span {
    font-weight: 600;
    color: var(--text-header);
}

/* ===========================
   OBSERVATII
=========================== */
.obs {
    margin-top: 12px;
    padding: 8px;
    background: rgba(0,0,0,0.05);
    border-radius: 6px;
    font-size: 14px;
}

/* ===========================
   BUTOANE
=========================== */
.butoane {
    margin-top: 14px;
    display: flex;
    gap: 10px;
}

.butoane button,
.butoane a {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    text-align: center;
    text-decoration: none;
    color: white;
}

.butoane button {
    background: #2563eb;
}

.butoane button:hover {
    background: #1e40af;
}

.butoane a {
    background: #475569;
}

.butoane a:hover {
    background: #334155;
}

/* ===========================
   CULORI CARDURI
=========================== */
.verde {
    border-left: 8px solid #22c55e;
}

.galben {
    border-left: 8px solid #eab308;
}

.rosu {
    border-left: 8px solid #ef4444;
}
  </style>
</head>

<body>

  <!-- ===========================
       HEADER NOU
  ============================ -->
  <header class="hub-header">
      <div class="hub-left">
          <img src="../../icons/96x96.png" class="hub-logo" alt="Logo">
          <span class="hub-title">Flota Auto</span>
      </div>

      <div class="hub-right">
          <button class="hub-btn" onclick="location.href='../../index.html'">⟵ Înapoi la HUB</button>
          <button class="hub-btn" id="themeToggle">🌙</button>
      </div>
  </header>

  <!-- ===========================
       LISTA MASINI
  ============================ -->
  <div id="lista" class="lista-container"></div>

  <!-- ===========================
       SCRIPT ÎNCĂRCARE MASINI
  ============================ -->
  <script>
async function incarcaMasini() {
  const raspuns = await fetch("https://script.google.com/macros/s/AKfycby44VeJwAhO5SDklVUyGB5otT0QBpue_vtfWyFScs5uelDlvIwkbJm6t6nZB1CjDOlW5A/exec");
  const masini = await raspuns.json();
  const container = document.getElementById("lista");

  masini.forEach(m => {
    const card = document.createElement("div");
    card.className = "card";

    // Convertim corect valorile
    function normalize(val) {
  if (val === null || val === undefined) return "-";

  // Convertim în string
  val = String(val);

  // Eliminăm TOATE spațiile, inclusiv cele invizibile
  val = val.replace(/[\s\u00A0]+/g, "");

  // Dacă e gol → "-"
  if (val === "") return "-";

  // Dacă e număr valid → întoarcem număr
  const nr = Number(val);
  if (!isNaN(nr)) return nr;

  return "-";
}

    const itp = zileRamase(m.itp);
const rca = zileRamase(m.rca);
const rov = zileRamase(m.rovinieta);

    // Culoare card
    const valori = [itp, rca, rov].filter(v => typeof v === "number");

let culoare = "verde";
if (valori.some(v => v <= 0)) culoare = "rosu";
else if (valori.some(v => v <= 30)) culoare = "galben";

    card.classList.add(culoare);

    const linkActe = m.link && m.link.startsWith("http") ? m.link : "#";

    card.innerHTML = `
      <div class="nr">${m.nr}</div>
      <div class="vin">VIN: ${m.vin}</div>

      <div class="linie"><span>ITP:</span> <b>${itp}</b> zile</div>
      <div class="linie"><span>RCA:</span> <b>${rca}</b> zile</div>
      <div class="linie"><span>Rovinietă:</span> <b>${rov}</b> zile</div>

      <div class="obs">Observații: ${m.obs || "-"}</div>

      <div class="butoane">
        <button onclick="modifica('${m.rowIndex}')">✏️ Modifică</button>
        <button onclick="veziActe('${linkActe}')">📁 Acte</button>
      </div>
    `;

    container.appendChild(card);
  });
}

function modifica(rowIndex) {
  window.location.href = `modifica.html?row=${rowIndex}`;
}

function veziActe(link) {
  if (link !== "#") window.open(link, "_blank");
}

window.onload = incarcaMasini;

function zileRamase(data) {
  if (!data || data.trim() === "") return "-";

  const azi = new Date();
  const expira = new Date(data);

  if (isNaN(expira.getTime())) return "-";

  const diff = Math.floor((expira - azi) / (1000 * 60 * 60 * 24));
  return diff;
}

</script>


  <!-- ===========================
       SCRIPT DARK / LIGHT
  ============================ -->
  <script>
    document.getElementById("themeToggle").onclick = () => {
        document.body.classList.toggle("dark");
    };
  </script>


</body>
</html>
