<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Lista Mașini - Flota Auto</title>
  <link rel="stylesheet" href="../../style.css">

  <style>
    /* ===========================
   FUNDAL + BODY
=========================== */

body {
    background: radial-gradient(circle at top, #1f2937 0, #020617 45%, #000 100%);
    margin: 0;
    font-family: Segoe UI, sans-serif;
    color: #ffffff;
    padding-top: 130px; /* spațiu pentru header fix */
}

/* ===========================
   HEADER FIX
=========================== */

.hub-header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 9999;
    background: radial-gradient(circle at top, #1f2937 0, #020617 45%, #000 100%);
    color: #ffffff;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    padding-left: 15px; /* înainte era 20px */
}

.hub-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.hub-logo {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
}

.hub-title {
    font-size: 30px;
    font-weight: 800;
}

.hub-right {
    display: flex;
    gap: 10px;
    margin-right: 20px;
}

/* ===========================
   BUTOANE HEADER
=========================== */

.btn-back {
    background: #8b5cf6;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 600;
}

.btn-back:hover {
    box-shadow: 0 0 12px rgba(139, 92, 246, 0.6);
    transform: translateY(-1px);
}

#addCarBtn {
    background: transparent;
    color: #22c55e;
    font-size: 22px;
    font-weight: bold;
    border: 2px solid #22c55e;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s ease;
}

#addCarBtn:hover {
    background: rgba(34, 197, 94, 0.15);
}

/* ===========================
   LINIA MOV
=========================== */

.header-line {
    width: 100%;
    height: 3px;
    background: #b450ff;
    box-shadow: 0 0 10px rgba(180, 80, 255, 0.7);
    position: absolute;
    bottom: 0;
    left: 0;
    z-index: 9998; /* sub header, peste restul */
}

/* ===========================
   GRID CARDURI
=========================== */

.lista-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 18px;
    padding: 20px;
}

/* ===========================
   CARDURI
=========================== */

.card {
    background: #1e293b;
    color: #ffffff;
    border-radius: 14px;
    padding: 16px;
    border: 1px solid #334155;
    box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    position: relative;
    z-index: 1;
}

.card:hover {
    transform: scale(1.01);
    box-shadow: 0 0 14px rgba(0,0,0,0.55);
    z-index: 5; /* sub linia mov */
}

/* ===========================
   TITLU + VIN
=========================== */

.card .nr {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 6px;
}

.marca {
  font-size: 1.2rem;
  font-weight: 600;
  margin-bottom: 8px;
  color: #cbd5e1;
}

.card .vin {
    font-size: 1.1rem;
    font-weight: 600;
    color: #cbd5e1;
    margin-bottom: 12px;
}

/* ===========================
   LINIUTE ITP / RCA / ROV
=========================== */

.linie {
    font-size: 1.3rem;
    font-weight: 600;
    margin: 6px 0;
    display: flex;
    justify-content: space-between;
}

.linie b {
    font-size: 1.4rem;
    font-weight: 700;
}

/* ===========================
   OBSERVATII
=========================== */

.card .obs {
    font-size: 1.2rem;
    margin-top: 10px;
    background: rgba(255,255,255,0.05);
    padding: 8px;
    border-radius: 6px;
}

/* ===========================
   BUTOANE CARD
=========================== */

.butoane {
    margin-top: 14px;
    display: flex;
    gap: 10px;
}

.butoane button,
.butoane a {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: none;
    cursor: not-allowed;
    font-weight: 600;
    font-size: 14px;
    text-align: center;
    text-decoration: none;
    background: #475569;
    color: #cbd5e1;
    opacity: 0.6;
}

.butoane button {
    background: #2563eb;
}

.butoane button:hover {
    background: #1e40af;
}

.butoane a {
    background: #475569;
}

.butoane a:hover {
    background: #334155;
}

/* ===========================
   CULORI CARDURI
=========================== */

.verde { border-left: 8px solid #22ff88; }
.galben { border-left: 8px solid #ffe666; }
.rosu { border-left: 8px solid #ff4444; }

  </style>
</head>

<body>

  <!-- HEADER FIX -->
    <header class="hub-header">

        <div class="hub-left">
            <img src="../../icons/96x96.png" class="hub-logo" alt="Logo">
            <span class="hub-title">Flota Auto</span>
        </div>

        <div class="hub-right">
            <button class="btn-back" onclick="window.location.href='../../index.html'">
                ← Înapoi la HUB
            </button>

            <button class="hub-btn" id="addCarBtn">➕</button>
        </div>

        <div class="header-line"></div>
    </header>
  
  <!-- ===========================
       LISTA MASINI
  ============================ -->
  <div id="lista" class="lista-container"></div>

  <!-- ===========================
       SCRIPT ÎNCĂRCARE MASINI
  ============================ -->
  <script>
async function incarcaMasini() {
  const raspuns = await fetch(
    "https://script.google.com/macros/s/AKfycby44VeJwAhO5SDklVUyGB5otT0QBpue_vtfWyFScs5uelDlvIwkbJm6t6nZB1CjDOlW5A/exec"
  );

  const masini = await raspuns.json();
  const container = document.getElementById("lista");

  masini.forEach(m => {
    const card = document.createElement("div");
    card.className = "card";

    // ===========================
    // CALCUL ZILE RAMASE
    // ===========================
    function zileRamase(data) {
      if (!data || data.trim() === "") return "-";

      const azi = new Date();
      const expira = new Date(data);

      if (isNaN(expira.getTime())) return "-";

      return Math.floor((expira - azi) / (1000 * 60 * 60 * 24));
    }

    const itp = zileRamase(m.itp);
    const rca = zileRamase(m.rca);
    const rov = zileRamase(m.rovinieta);

    // ===========================
    // CULOARE CARD
    // ===========================
    const valori = [itp, rca, rov].filter(v => typeof v === "number");

    let culoare = "verde";
    if (valori.some(v => v <= 0)) culoare = "rosu";
    else if (valori.some(v => v <= 30)) culoare = "galben";

    card.classList.add(culoare);

    // ===========================
    // LINK ACTE
    // ===========================
    const linkActe = m.link && m.link.startsWith("http") ? m.link : "#";

    // ===========================
    // HTML CARD (CU MARCA)
    // ===========================
    card.innerHTML = `
      <div class="nr">${m.nr}</div>

      <div class="marca">${m.marca || ""}</div>

      <div class="vin">VIN: ${m.vin}</div>

      <div class="linie"><span>ITP:</span> <b>${itp}</b> zile</div>
      <div class="linie"><span>RCA:</span> <b>${rca}</b> zile</div>
      <div class="linie"><span>Rovinietă:</span> <b>${rov}</b> zile</div>

      <div class="obs">Observații: ${m.obs || "-"}</div>

      <div class="butoane">
        <button onclick="modifica('${m.rowIndex}')">Modifică</button>
        <button onclick="veziActe('${linkActe}')">Acte</button>
      </div>
    `;

    container.appendChild(card);
  });
}

function modifica(rowIndex) {
  return; // dezactivat
}

function veziActe(link) {
  if (link !== "#") window.open(link, "_blank");
}

window.onload = incarcaMasini;

</script>


  <!-- ===========================
       SCRIPT DARK / LIGHT
  ============================ -->
  <script>
    document.getElementById("addCarBtn").onclick = () => {
        window.location.href = "adauga.html";
    };
  </script>


</body>
</html>
