<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Lista Mașini - Flota Auto</title>
  <link rel="stylesheet" href="../../style.css">

  <style>
    /* ===========================
       VARIABILE DARK / LIGHT
    ============================ */
    :root {
        --bg: #f5f5f5;
        --bg-header: #ffffff;
        --text-header: #1e293b;
        --btn-bg: #e2e8f0;
        --btn-text: #1e293b;
        --card-bg: #ffffff;
        --card-border: #ddd;
    }

    .dark {
        --bg: #0f172a;
        --bg-header: #1e293b;
        --text-header: #f8fafc;
        --btn-bg: #334155;
        --btn-text: #f8fafc;
        --card-bg: #1e293b;
        --card-border: #475569;
    }

    body {
        background: var(--bg);
        color: var(--text-header);
        margin: 0;
        font-family: Segoe UI, sans-serif;
    }

    /* ===========================
       HEADER
    ============================ */
    .hub-header {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: var(--bg-header);
        color: var(--text-header);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 18px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .hub-left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .hub-logo {
        height: 32px;
    }

    .hub-title {
        font-size: 20px;
        font-weight: 600;
    }

    .hub-right {
        display: flex;
        gap: 10px;
    }

    .hub-btn {
        background: var(--btn-bg);
        color: var(--btn-text);
        border: none;
        padding: 8px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
    }

    /* ===========================
       CARDURI MASINI
    ============================ */
    .lista-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 15px;
        padding: 15px;
    }

    .card {
        background: var(--card-bg);
        border: 2px solid var(--card-border);
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card h2 {
        margin: 0 0 5px;
        font-size: 20px;
    }

    .card p {
        margin: 4px 0;
        font-size: 14px;
    }

    .verde { color: #2ecc71; }
    .galben { color: #f1c40f; }
    .rosu { color: #e74c3c; }

    .butoane {
        margin-top: 12px;
        display: flex;
        gap: 10px;
    }

    .butoane button,
    .butoane a {
        flex: 1;
        padding: 10px;
        font-size: 15px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        color: white;
    }

    .butoane button {
        background: #2B6CB0;
    }

    .butoane a {
        background: #555;
    }
  </style>
</head>

<body>

  <!-- ===========================
       HEADER NOU
  ============================ -->
  <header class="hub-header">
      <div class="hub-left">
          <img src="../../icons/96x96.png" class="hub-logo" alt="Logo">
          <span class="hub-title">Flota Auto</span>
      </div>

      <div class="hub-right">
          <button class="hub-btn" onclick="location.href='../../index.html'">⟵ Înapoi la HUB</button>
          <button class="hub-btn" id="themeToggle">🌙</button>
      </div>
  </header>

  <!-- ===========================
       LISTA MASINI
  ============================ -->
  <div id="lista" class="lista-container"></div>

  <!-- ===========================
       SCRIPT ÎNCĂRCARE MASINI
  ============================ -->
  <script>
async function incarcaMasini() {
  const raspuns = await fetch("https://script.google.com/macros/s/AKfycby44VeJwAhO5SDklVUyGB5otT0QBpue_vtfWyFScs5uelDlvIwkbJm6t6nZB1CjDOlW5A/exec");
  const masini = await raspuns.json();
  const container = document.getElementById("lista");

  masini.forEach(m => {
    const card = document.createElement("div");
    card.className = "card";

    // Convertim valorile goale în "-"
    const itp = (m.zile_itp === "" || m.zile_itp === null) ? "-" : m.zile_itp;
    const rca = (m.zile_rca === "" || m.zile_rca === null) ? "-" : m.zile_rca;
    const rov = (m.zile_rov === "" || m.zile_rov === null) ? "-" : m.zile_rov;

    // Culoare card
    const valori = [itp, rca, rov].map(v => parseInt(v, 10));

    let culoare = "verde";
    if (valori.some(v => !isNaN(v) && v <= 0)) culoare = "rosu";
    else if (valori.some(v => !isNaN(v) && v <= 30)) culoare = "galben";

    card.classList.add(culoare);

    // Link acte
    const linkActe = m.link && m.link.startsWith("http") ? m.link : "#";

    card.innerHTML = `
      <div class="nr">${m.nr}</div>
      <div class="vin">VIN: ${m.vin}</div>

      <div class="itp">ITP: <b>${itp}</b> zile</div>
      <div class="rca">RCA: <b>${rca}</b> zile</div>
      <div class="rov">Rovinietă: <b>${rov}</b> zile</div>

      <div class="obs">Observații: ${m.obs || "-"}</div>

      <button onclick="modifica('${m.rowIndex}')">✏️ Modifică</button>
      <button onclick="veziActe('${linkActe}')">📁 Acte</button>
    `;

    container.appendChild(card);
  });
}

function modifica(rowIndex) {
  window.location.href = `modifica.html?row=${rowIndex}`;
}

function veziActe(link) {
  if (link !== "#") window.open(link, "_blank");
}

window.onload = incarcaMasini;
</script>


  <!-- ===========================
       SCRIPT DARK / LIGHT
  ============================ -->
  <script>
    document.getElementById("themeToggle").onclick = () => {
        document.body.classList.toggle("dark");
    };
  </script>


</body>
</html>
