<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Adaugă mașină</title>
    <style>
        body {
            background: radial-gradient(circle at top, #1f2937 0, #020617 45%, #000 100%);
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        h2 {
            color: #6a0dad;
            margin-bottom: 10px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            color: #ff4444
           
        }

        input, textarea {
            color: white;
            background-color: #1e293b;
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        .btn-full {
            width: 100%;
            background-color: #6a0dad;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            margin-top: 25px;
            cursor: pointer;
        }

        .btn-full:hover {
            background-color: #580b9e;
        }
/* Buton mov */
.btn-back {
    display: inline-block !important;
    background: #8b5cf6 !important; /* Movul butonului */
    color: white !important;
    padding: 10px 20px !important;
    border-radius: 8px !important;
    border: none !important;
    cursor: pointer !important;
    white-space: nowrap !important;
}

.btn-back:hover {
    justify-content: flex-end; /* împinge butonul la dreapta */
    background: #8b5cf6 !important; /* Movul tău */
    box-shadow: 0 0 12px rgba(139, 92, 246, 0.6);
    transform: translateY(-1px);
}
    
.top-bar {
    display: flex;
    justify-content: flex-end; /* împinge butonul la dreapta */
    padding: 20px;
}

    </style>
</head>

<body>
<div class="top-bar">
    <button class="btn-back" onclick="window.location.href='../../index.html'">
        ← Înapoi la HUB
    </button>
</div>

<h2>Adaugă mașină</h2>

<form id="formMasina">

    <label>Număr înmatriculare</label>
    <input type="text" id="nr" required>

    <label>VIN</label>
    <input type="text" id="vin">

    <label>Marcă vehicul</label>
    <input type="text" id="marca">

    <label>Data RCA</label>
    <input type="date" id="rca">

    <label>Data ITP</label>
    <input type="date" id="itp">

    <label>Data Rovinietă</label>
    <input type="date" id="rovinieta">

    <label>Link poze Acte (Drive)</label>
    <input type="text" id="link">

    <label>Observații</label>
    <textarea id="obs" rows="3"></textarea>

    <button type="button" class="btn-full" onclick="salveazaMasina()">💾 Salvează mașina</button>

</form>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby44VeJwAhO5SDklVUyGB5otT0QBpue_vtfWyFScs5uelDlvIwkbJm6t6nZB1CjDOlW5A/exec";

    function salveazaMasina() {
        const data = {
            nr: document.getElementById("nr").value,
            vin: document.getElementById("vin").value,
            marca: document.getElementById("marca").value,
            rca: document.getElementById("rca").value,
            itp: document.getElementById("itp").value,
            rovinieta: document.getElementById("rovinieta").value,
            link: document.getElementById("link").value,
            obs: document.getElementById("obs").value
        };

        fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
        })
        .then(r => r.text())
        .then(r => {
            alert("Mașina a fost adăugată cu succes!");
            window.location.href = "index.html";
        })
        .catch(err => alert("Eroare la salvare: " + err));
    }
</script>

</body>
</html>
