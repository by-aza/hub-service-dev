<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#0078d7">
    <title>Adaugă mașină</title>
    <style>
        :root {
            --bg-top: #1f2937;
            --bg-mid: #020617;
            --bg-bottom: #000000;
            --card-bg: rgba(15, 23, 42, 0.9);
            --card-border: #334155;
            --text-main: #e5e7eb;
            --text-muted: #cbd5e1;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --field-bg: #1e293b;
            --field-border: #475569;
            --danger-label: #f87171;
            --shadow-soft: 0 10px 25px rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, var(--bg-top) 0, var(--bg-mid) 45%, var(--bg-bottom) 100%);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text-main);
        }

        .page-wrap {
            width: 100%;
            max-width: 760px;
            margin: 0 auto;
            padding: 14px 12px 24px;
        }

        .hub-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .hub-logo {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            padding: 3px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.2);
        }

        .page-title {
            margin: 0;
            font-size: clamp(1.25rem, 2.7vw, 1.8rem);
            line-height: 1.1;
            white-space: nowrap;
        }

        .btn-back {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            min-height: 48px;
            padding: 10px 16px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            touch-action: manipulation;
        }

        .btn-back:hover {
            background: var(--accent-hover);
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.55);
        }

        .header-line {
            width: 100%;
            height: 2px;
            background: #b450ff;
            box-shadow: 0 0 10px rgba(180, 80, 255, 0.7);
            margin-bottom: 14px;
        }

        .form-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px;
            box-shadow: var(--shadow-soft);
        }

        h2 {
            color: var(--text-main);
            margin: 0 0 12px 0;
            font-size: clamp(1.15rem, 2.4vw, 1.45rem);
        }

        label {
            font-weight: 600;
            display: block;
            margin-top: 14px;
            color: var(--danger-label);
            font-size: 0.95rem;
        }

        input,
        textarea {
            color: #fff;
            background-color: var(--field-bg);
            width: 100%;
            min-height: 48px;
            padding: 12px 14px;
            margin-top: 6px;
            border: 1px solid var(--field-border);
            border-radius: 10px;
            font-size: 16px;
            line-height: 1.3;
        }

        textarea {
            min-height: 104px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        .btn-full {
            width: 100%;
            min-height: 52px;
            background-color: var(--accent);
            color: #fff;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .btn-full:hover {
            background-color: var(--accent-hover);
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.55);
        }

        @media (max-width: 700px) {
            .page-wrap {
                padding: 10px 10px 20px;
            }

            .hub-logo {
                width: 48px;
                height: 48px;
            }

            .hub-header {
                align-items: flex-start;
                gap: 10px;
            }

            .btn-back {
                padding: 10px 12px;
                font-size: 0.88rem;
            }

            .form-card {
                padding: 14px;
            }
        }

    </style>
</head>

<body>
<div class="page-wrap">
    <header class="hub-header">
        <div class="header-left">
            <img src="../../icons/logo.png" alt="Logo" class="hub-logo">
            <h1 class="page-title">Flota Auto</h1>
        </div>
        <button class="btn-back" onclick="window.location.href='../../index.html'">
            ← Înapoi la HUB
        </button>
    </header>
    <div class="header-line"></div>

<section class="form-card">
<h2>Adaugă mașină</h2>

<form id="formMasina">

    <label>Număr înmatriculare</label>
    <input type="text" id="nr" required>

    <label>VIN</label>
    <input type="text" id="vin">

    <label>Marcă vehicul</label>
    <input type="text" id="marca">

    <label>Data RCA</label>
    <input type="date" id="rca">

    <label>Data ITP</label>
    <input type="date" id="itp">

    <label>Data Rovinietă</label>
    <input type="date" id="rovinieta">

    <label>Link poze Acte (Drive)</label>
    <input type="text" id="link">

    <label>Observații</label>
    <textarea id="obs" rows="3"></textarea>

    <button type="button" class="btn-full" onclick="salveazaMasina()">💾 Salvează mașina</button>

</form>
</section>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby44VeJwAhO5SDklVUyGB5otT0QBpue_vtfWyFScs5uelDlvIwkbJm6t6nZB1CjDOlW5A/exec";

    function salveazaMasina() {
        const data = {
            nr: document.getElementById("nr").value,
            vin: document.getElementById("vin").value,
            marca: document.getElementById("marca").value,
            rca: document.getElementById("rca").value,
            itp: document.getElementById("itp").value,
            rovinieta: document.getElementById("rovinieta").value,
            link: document.getElementById("link").value,
            obs: document.getElementById("obs").value
        };

        fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
        })
        .then(r => r.text())
        .then(r => {
            alert("Mașina a fost adăugată cu succes!");
            window.location.href = "index.html";
        })
        .catch(err => alert("Eroare la salvare: " + err));
    }
</script>

</body>
</html>
