  <script>
  /* ============================================================
     NOTE 1 — URL-ul CSV PUBLIC (funcționează 100%)
     Dacă se schimbă fișierul sau tabul, modifici DOAR această linie.
     ============================================================ */
  const CSV_URL =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7mX8RLv-YJ8OU0zCF3Kt6khLDosTW5wAZJ6Ba83Xd8U24gNqXIupTdwJl_j3tftiOdfAqo2E1cPeL/pub?gid=906891078&single=true&output=csv";

  let allProducts = [];
  let currentFilter = "all";
  let currentSearch = "";

  /* ============================================================
     NOTE 2 — PARSARE CSV (ACUM INCLUDE ȘI PRAG MINIM)
     ============================================================ */
  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);

    const rows = lines.map((line) =>
      line
        .split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/)
        .map((c) => c.replace(/^"|"$/g, ""))
    );

    const header = rows.shift() || [];

    const idxCode = header.findIndex((h) => h.toLowerCase().includes("cod"));
    const idxName = header.findIndex((h) => h.toLowerCase().includes("denum"));
    const idxStock = header.findIndex((h) => h.toLowerCase().includes("stoc"));
    const idxPrag = header.findIndex((h) => h.toLowerCase().includes("prag"));

    return rows
      .map((cols) => {
        const code = cols[idxCode] || "";
        const name = cols[idxName] || "";
        const stock = Number((cols[idxStock] || "0").replace(",", ".")) || 0;
        const prag = Number((cols[idxPrag] || "").replace(",", ".")) || null;

        return { code, name, stock, prag };
      })
      .filter((p) => p.name || p.code);
  }

  /* ============================================================
     NOTE 3 — LOGICĂ STATUS (OK / LOW / OUT)
     ============================================================ */
  function computeStatus(product) {
    const stock = product.stock;
    const prag = product.prag;

    if (stock <= 0) return "out";

    // dacă pragul nu este setat → produsul este OK
    if (prag === null || isNaN(prag)) return "ok";

    if (stock > 0 && stock <= prag) return "low";

    return "ok";
  }

  /* ============================================================
     NOTE 4 — RENDER LISTĂ PRODUSE
     ============================================================ */
  function render() {
    const listEl = document.getElementById("product-list");
    const visibleCountEl = document.getElementById("visible-count");

    listEl.innerHTML = "";

    const filtered = allProducts.filter((p) => {
      const status = computeStatus(p);

      if (currentFilter !== "all" && status !== currentFilter) return false;

      if (currentSearch) {
        const q = currentSearch.toLowerCase();
        if (
          !p.name.toLowerCase().includes(q) &&
          !p.code.toLowerCase().includes(q)
        ) {
          return false;
        }
      }

      return true;
    });

    if (!filtered.length) {
      listEl.innerHTML =
        '<div class="empty-state">Niciun produs nu corespunde filtrului curent.</div>';
    } else {
      filtered.forEach((p) => {
        const status = computeStatus(p);

        const row = document.createElement("div");
        row.className = "product-row";

        row.innerHTML = `
          <div class="prod-main">
            <div class="prod-name">${p.name}</div>

            <div class="prod-meta">
              <span class="badge-status ${status}">
                <span class="dot"></span>
                ${status.toUpperCase()}
              </span>

              <span class="prod-stock">
                Stoc: <strong>${p.stock}</strong> buc
              </span>
            </div>

            <div class="prod-code">Cod produs: ${p.code}</div>
          </div>

          <div class="prod-right">
            ${
              p.prag !== null
                ? `<span class="pill-small">Prag: ${p.prag}</span>`
                : `<span class="pill-small" style="opacity:0.4;">Fără prag</span>`
            }
          </div>
        `;

      // colorare text "Stoc: X buc"
const stockEl = row.querySelector(".prod-stock");
if (status === "ok") stockEl.classList.add("ok");
if (status === "low") stockEl.classList.add("low");
if (status === "out") stockEl.classList.add("out");

        listEl.appendChild(row);
      });
    }

    visibleCountEl.textContent = `${filtered.length} produse afișate`;
  }

  /* ============================================================
     NOTE 5 — DASHBOARD (OK / LOW / OUT / TOTAL)
     ============================================================ */
  function updateDashboard() {
    const total = allProducts.length;
    let ok = 0;
    let low = 0;
    let out = 0;

    allProducts.forEach((p) => {
      const status = computeStatus(p);
      if (status === "ok") ok++;
      if (status === "low") low++;
      if (status === "out") out++;
    });

    document.getElementById("count-total").textContent = total;
    document.getElementById("count-ok").textContent = ok;
    document.getElementById("count-low").textContent = low;
    document.getElementById("count-out").textContent = out;
  }

  /* ============================================================
     NOTE 6 — FILTRE + SEARCH
     ============================================================ */
  function setFilter(status) {
    currentFilter = status;
    document
      .querySelectorAll(".filter-btn")
      .forEach((btn) => btn.classList.remove("active"));
    document
      .querySelector(`.filter-btn[data-status="${status}"]`)
      ?.classList.add("active");
    render();
  }

  function initEvents() {
    document.querySelectorAll(".filter-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        setFilter(btn.getAttribute("data-status"));
      });
    });

    document.getElementById("search-input").addEventListener("input", (e) => {
      currentSearch = e.target.value.trim();
      render();
    });
  }

  /* ============================================================
     NOTE 7 — ÎNCĂRCARE DATE
     ============================================================ */
  async function loadData() {
    try {
      const res = await fetch(CSV_URL);
      if (!res.ok) throw new Error("HTTP " + res.status);

      const text = await res.text();
      allProducts = parseCSV(text);

    //  updateDashboard();
      render();
    } catch (err) {
      console.error("Eroare CSV:", err);
      document.getElementById("product-list").innerHTML =
        '<div class="empty-state">Eroare la încărcarea datelor din Google Sheets.</div>';
    }
  }

  initEvents();
  loadData();
</script>
</body>
</html>
