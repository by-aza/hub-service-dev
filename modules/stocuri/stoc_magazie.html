<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <title>Piese stoc magazie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="../../manifest.json">
  <meta name="theme-color" content="#0078d7">
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("../../sw.js").catch((error) => {
          console.error("Service Worker registration failed:", error);
        });
      });
    }
  </script>

  <style>
    :root {
      --bg: #0f172a;
      --bg-elevated: #111827;
      --card: #020617;
      --accent-ok: #22c55e;
      --accent-out: #ef4444;
      --accent-low: #eab308;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --border-subtle: #1f2937;
      --radius: 10px;
      --shadow-soft: 0 10px 25px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2937 0, #020617 45%, #000 100%);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .layout {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding-bottom: 50px;
    }

    .hub-logo {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      padding: 4px;
      backdrop-filter: blur(6px);
      transition: 0.25s ease;
      box-shadow: 0 0 8px rgba(0,0,0,0.15);
    }

    .hub-logo:hover {
      transform: scale(1.03);
      box-shadow: 0 0 14px rgba(0,0,0,0.25);
    }

    .btn-back {
      display: inline-block;
      background: #8b5cf6;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
    }

    .btn-back:hover {
      background: #a78bfa;
      box-shadow: 0 0 12px rgba(139, 92, 246, 0.6);
      transform: translateY(-1px);
    }

    .hub-header {
      position: sticky;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
      padding: 1px 0;
      margin: 0 auto;
      max-width: 98%;
      width: 100%;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header-left h1 {
      font-size: 2.1rem;
      line-height: 1.05;
    }

    .header-line {
      position: relative;
      left: 0;
      width: 100vw;
      margin-left: calc(-50vw + 50%);
      height: 2px;
      background: #b450ff;
      box-shadow: 0 0 10px rgba(180, 80, 255, 0.7);
      z-index: 10;
      margin-bottom: 8px;
    }

    .table-card {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(15, 23, 42, 0.96);
      border-radius: var(--radius);
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-soft);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
    }

    .table-title-text {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }

    .search-box {
      flex: 1;
      max-width: 300px;
      width: 260px;
      position: relative;
    }

    .search-input {
      width: 100%;
      border-radius: 999px;
      border: 1px solid var(--border-subtle);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text-main);
      padding: 7px 12px;
      font-size: 0.85rem;
      outline: none;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .filters {
      display: flex;
      gap: 6px;
    }

    .filter-btn {
      border-radius: 999px;
      border: 1px solid var(--border-subtle);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text-muted);
      font-size: 0.8rem;
      padding: 6px 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .filter-btn .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      display: inline-block;
    }

    .filter-btn[data-status="all"] .dot {
      background: linear-gradient(90deg, var(--accent-ok), var(--accent-low), var(--accent-out));
    }

    .filter-btn[data-status="nou"] .dot {
      background: var(--accent-ok);
    }

    .filter-btn[data-status="sh"] .dot {
      background: #f97316;
    }

    .filter-btn.active {
      border-color: var(--accent-low);
      color: var(--text-main);
      background: radial-gradient(circle at top left, #1f2937, #020617);
    }

    .count {
      white-space: nowrap;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-left: 12px;
    }

    .product-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 74vh;
      overflow: auto;
      padding-right: 4px;
      width: 100%;
    }

    .product-row {
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(0, 1fr);
      gap: 8px;
      padding: 8px 9px;
      border-radius: 8px;
      background: radial-gradient(circle at top left, #020617, #020617 55%, #020617);
      border: 1px solid rgba(31, 41, 55, 0.9);
      align-items: center;
      transition: border-color 0.15s, background 0.15s, transform 0.08s;
    }

    .product-row:hover {
      border-color: #4b5563;
      background: radial-gradient(circle at top left, #020617, #020617 40%, #111827);
      transform: translateY(-1px);
    }

    .prod-main {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .prod-name {
      font-size: 1.3rem;
      font-weight: 600;
    }

    .prod-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-top: 2px;
    }

    .badge-status {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .badge-status.ok {
      border-color: rgba(34, 197, 94, 0.4);
      color: var(--accent-ok);
      background: rgba(22, 163, 74, 0.08);
    }

    .badge-status.nou {
      border-color: rgba(34, 197, 94, 0.45);
      color: #bbf7d0;
      background: rgba(22, 163, 74, 0.35);
    }

    .badge-status.sh {
      border-color: rgba(249, 115, 22, 0.45);
      color: #ffedd5;
      background: rgba(249, 115, 22, 0.35);
    }

    .badge-status .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: currentColor;
    }

    .prod-stock {
      font-size: 0.8rem;
      color: var(--text-main);
    }

    .prod-stock strong {
      font-size: 1.3rem;
    }

    .prod-code {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .prod-right {
      text-align: right;
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: 4px;
      justify-content: center;
    }

    .prod-price {
      font-size: 1.15rem;
      font-weight: 700;
      color: #f8fafc;
    }

    .prod-obs {
      color: #fca5a5;
      font-size: 0.78rem;
      line-height: 1.25;
    }

    .prod-line {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .prod-line.row-3 {
      gap: 20px;
    }

    .prod-raft {
      color: #fdba74;
      font-size: 0.82rem;
    }

    .prod-stoc {
      color: #fb923c;
      font-size: 0.84rem;
      font-weight: 600;
    }

    .prod-extra {
      color: var(--text-muted);
      font-size: 0.78rem;
      display: inline-flex;
      align-items: center;
      gap: 16px;
      margin-left: 10px;
      flex-wrap: wrap;
    }

    .site-link {
      color: #cfe3ff;
      text-decoration: none;
      border: 1px solid rgba(147, 197, 253, 0.35);
      background: rgba(59, 130, 246, 0.12);
      padding: 4px 9px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    }

    .site-link:hover {
      color: #eaf2ff;
      background: rgba(59, 130, 246, 0.22);
      border-color: rgba(147, 197, 253, 0.6);
      transform: translateY(-1px);
    }

    .empty-state {
      font-size: 0.85rem;
      color: var(--text-muted);
      padding: 10px 4px;
    }

    .pill-small {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    @media (max-width: 900px) {
      .table-header {
        flex-wrap: wrap;
        gap: 10px;
      }

      .table-header .search-box {
        order: 2;
        width: 100%;
        max-width: 100%;
      }

      .table-header .filters {
        order: 3;
        width: 100%;
        margin: 0;
        gap: 8px;
      }

      .count {
        order: 4;
        width: 100%;
        margin-left: 0;
        white-space: normal;
      }
    }

    @media (max-width: 700px) {
      .product-row {
        grid-template-columns: minmax(0, 1fr);
      }

      .prod-right {
        text-align: left;
      }

      .hub-header {
        max-width: 100%;
        padding: 2px 6px;
        gap: 8px;
      }

      .header-left {
        gap: 8px;
        min-width: 0;
      }

      .header-left h1 {
        font-size: 1.05rem;
        line-height: 1.1;
        margin: 0;
      }

      .hub-logo {
        width: 50px;
        height: 50px;
        padding: 2px;
      }

      .btn-back {
        padding: 8px 10px;
        font-size: 0.85rem;
      }
    }

    @media (max-width: 600px) {
      .table-header .filters {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filter-btn {
        justify-content: center;
        min-height: 38px;
      }
    }
  </style>
</head>
<body>
  <header class="hub-header">
    <div class="header-left">
      <img src="../../icons/logo.png" alt="Logo" class="hub-logo">
      <h1>Piese stoc magazie</h1>
    </div>
    <a class="btn-back" href="../../index.html">← Înapoi la HUB</a>
  </header>
  <div class="header-line"></div>

  <main class="layout">
    <section class="table-card">
      <div class="table-header">
        <span class="table-title-text">Piese pe stoc</span>

        <div class="search-box">
          <input
            type="text"
            class="search-input"
            id="search-input"
            placeholder="Caută după denumire sau cod..."
          />
        </div>

        <div class="filters">
          <button class="filter-btn active" data-status="all"><span class="dot"></span> Toate</button>
          <button class="filter-btn" data-status="nou"><span class="dot"></span> NOU</button>
          <button class="filter-btn" data-status="sh"><span class="dot"></span> SH</button>
        </div>

        <span class="count" id="visible-count">1 produse afișate</span>
      </div>

      <div class="product-list" id="pieseContainer">
        <div class="empty-state">Se încarcă piesele din Google Sheets...</div>
      </div>
    </section>
  </main>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7mX8RLv-YJ8OU0zCF3Kt6khLDosTW5wAZJ6Ba83Xd8U24gNqXIupTdwJl_j3tftiOdfAqo2E1cPeL/pub?gid=307976863&single=true&output=csv";
    let allPiese = [];
    let searchQuery = "";
    let currentFilter = "all";

    function parseCsvLine(line) {
      const cols = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === "\"") {
          if (inQuotes && line[i + 1] === "\"") {
            current += "\"";
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          cols.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      cols.push(current.trim());
      return cols.map((c) => c.replace(/^"|"$/g, ""));
    }

    function parseCSV(text) {
      const lines = text.split(/\r?\n/).filter((line) => line.trim().length > 0);
      if (lines.length <= 1) {
        return [];
      }

      const rows = lines.map(parseCsvLine);
      const dataRows = rows.slice(1);

      return dataRows.map((row) => ({
        // Index zero-based (A=0)
        codOEM: row[1] || "",       // B
        denumire: row[2] || "",     // C
        observatii: row[3] || "",   // D
        stare: row[4] || "",        // E
        raft: row[5] || "",         // F
        pret: row[7] || "",         // H
        stoc: row[8] || "",         // I
        idSite: row[9] || "",       // J
        linkSite: row[10] || ""     // K
      })).filter((item) => item.denumire);
    }

    function normalizeStare(value) {
      return String(value || "").trim().toUpperCase();
    }

    function getStareClass(stare) {
      const normalized = normalizeStare(stare);
      if (normalized === "NOU") return "nou";
      if (normalized === "SH") return "sh";
      return "";
    }

    function ensureUrl(url) {
      const raw = String(url || "").trim();
      if (!raw) return "";
      if (/^https?:\/\//i.test(raw)) return raw;
      return `https://${raw}`;
    }

    function renderPiese() {
      const container = document.getElementById("pieseContainer");
      const countEl = document.getElementById("visible-count");
      container.innerHTML = "";

      const filtered = allPiese.filter((item) => {
        const stareNormalized = String(item.stare || "").trim().toLowerCase();
        if (currentFilter !== "all" && stareNormalized !== currentFilter) {
          return false;
        }

        if (!searchQuery) return true;
        const q = searchQuery.toLowerCase();
        return (
          item.denumire.toLowerCase().includes(q) ||
          item.codOEM.toLowerCase().includes(q) ||
          item.idSite.toLowerCase().includes(q)
        );
      });

      if (!filtered.length) {
        container.innerHTML = '<div class="empty-state">Nu există piese pentru criteriul selectat.</div>';
        countEl.textContent = "0 produse afișate";
        return;
      }

      filtered.forEach((item) => {
        const row = document.createElement("div");
        row.className = "product-row";

        const stare = normalizeStare(item.stare);
        const stareClass = getStareClass(stare);
        const siteUrl = ensureUrl(item.linkSite);
        const siteLinkHtml = siteUrl
          ? `<a class="site-link" href="${siteUrl}" target="_blank" rel="noopener noreferrer">Link Site <span aria-hidden="true">↗</span></a>`
          : "";

        row.innerHTML = `
          <div class="prod-main">
            <div class="prod-name" style="color: ${parseInt(item.stoc) === 0 ? 'red' : 'inherit'}">${item.denumire}</div>


            <div class="prod-line">
              <span class="badge-status ${stareClass}">
                <span class="dot"></span>
                ${stare || "-"}
              </span>
              <span class="prod-raft">Raft: ${item.raft || "-"}</span>
              <span class="prod-stoc" style="color: ${parseInt(item.stoc) === 0 ? 'red' : '#ff9800'}">Stoc: ${item.stoc || "-"}</span>

            </div>

            <div class="prod-line row-3">
              <span class="prod-code">Cod OEM: ${item.codOEM || "-"}</span>
              <span class="prod-extra">
                ID Site: ${item.idSite || "-"}
                ${siteLinkHtml}
              </span>
            </div>
          </div>

          <div class="prod-right">
            <span class="prod-price" style="color: ${parseInt(item.stoc) === 0 ? 'red' : 'inherit'}">${item.pret || "-"} RON</span>

            <span class="prod-obs">${item.observatii || "-"}</span>
          </div>
        `;

        container.appendChild(row);
      });

      countEl.textContent = `${filtered.length} produse afișate`;
    }

    async function loadPiese() {
      try {
        const res = await fetch(CSV_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        allPiese = parseCSV(text);
        renderPiese();
      } catch (error) {
        console.error("Eroare la încărcarea pieselor:", error);
        document.getElementById("pieseContainer").innerHTML =
          '<div class="empty-state">Eroare la încărcarea datelor din Google Sheets.</div>';
        document.getElementById("visible-count").textContent = "0 produse afișate";
      }
    }

    document.querySelectorAll(".filter-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach((x) => x.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.getAttribute("data-status") || "all";
        renderPiese();
      });
    });

    document.getElementById("search-input").addEventListener("input", (e) => {
      searchQuery = e.target.value.trim();
      renderPiese();
    });
    

    loadPiese();
  </script>
</body>
</html>
